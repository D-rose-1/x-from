server:
  port: 8091

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置 - 连接Docker MySQL
spring:
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://mysql:3306/x_form?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: Form_HikariCP
      minimum-idle: 10
      idle-timeout: 300000
      maximum-pool-size: 50
      auto-commit: true
      max-lifetime: 1800000
      connection-timeout: 5000
      connection-test-query: SELECT 1
      leak-detection-threshold: 10000
  # Redis配置 - 连接Docker Redis
  data:
    redis:
      host: redis
      port: 6379
      password: 123456
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 8

# MyBatis
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  config-location: classpath:/mybatis/config/mybatis-config.xml

# 日志
logging:
  level:
    root: info
    cn.wwc: debug
  config: classpath:logback-spring.xml

# Ollama 智能客服配置
ollama:
  base-url: http://ollama:11434
  model: qwen2.5:0.5b
