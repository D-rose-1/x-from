<!-- ========== 智能客服浮窗 ========== -->
<style>
/* 聊天浮动按钮 */
.chat-fab {
  position: fixed; bottom: 28px; right: 28px;
  width: 56px; height: 56px;
  border-radius: 50%; border: none;
  background: linear-gradient(135deg, #4361ee, #764ba2);
  color: #fff; font-size: 28px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(67,97,238,.4);
  z-index: 9999; transition: all .3s;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(67,97,238,.5); }
.chat-fab.hidden { display: none; }

/* 聊天面板 */
.chat-panel {
  position: fixed; bottom: 96px; right: 28px;
  width: 380px; height: 520px;
  background: #fff; border-radius: 16px;
  box-shadow: 0 12px 48px rgba(0,0,0,.18);
  z-index: 9998; display: none; flex-direction: column;
  overflow: hidden; transition: all .3s;
  animation: chatSlideUp .3s ease;
}
.chat-panel.open { display: flex; }
@keyframes chatSlideUp {
  from { opacity: 0; transform: translateY(20px) scale(.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 面板头部 */
.chat-header {
  background: linear-gradient(135deg, #4361ee, #764ba2);
  color: #fff; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.chat-header h3 { font-size: 16px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
.chat-header .badge { font-size: 10px; background: rgba(255,255,255,.25); padding: 2px 8px; border-radius: 10px; font-weight: 400; }
.chat-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; opacity: .8; }
.chat-close:hover { opacity: 1; }

/* 消息区域 */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  background: #f7f8fc;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 4px; }

/* 消息气泡 */
.msg { max-width: 82%; animation: msgIn .25s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-user { align-self: flex-end; }
.msg-assistant { align-self: flex-start; }
.msg-system { display: none; } /* 隐藏系统消息 */

.msg .bubble {
  padding: 10px 14px; border-radius: 16px;
  font-size: 13.5px; line-height: 1.6;
  word-break: break-word; white-space: pre-wrap;
}
.msg-user .bubble {
  background: linear-gradient(135deg, #4361ee, #5a4ff3);
  color: #fff; border-bottom-right-radius: 4px;
}
.msg-assistant .bubble {
  background: #fff; color: #333;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.msg .time {
  font-size: 10px; color: #aaa; margin-top: 4px;
  padding: 0 4px;
}
.msg-user .time { text-align: right; }

/* 快捷提示 */
.quick-hints {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 16px; background: #f7f8fc; flex-shrink: 0;
}
.quick-hint {
  padding: 5px 12px; border-radius: 14px; border: 1px solid #e0e0e0;
  background: #fff; font-size: 12px; color: #555; cursor: pointer;
  transition: all .2s; white-space: nowrap;
}
.quick-hint:hover { border-color: #4361ee; color: #4361ee; background: #f0f3ff; }

/* 输入区域 */
.chat-input-area {
  padding: 12px 16px; background: #fff; border-top: 1px solid #f0f0f0;
  display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
}
.chat-input-area textarea {
  flex: 1; border: 1.5px solid #e8e8e8; border-radius: 20px;
  padding: 9px 16px; font-size: 13.5px; outline: none;
  resize: none; max-height: 80px; font-family: inherit;
  line-height: 1.5; transition: border .2s;
}
.chat-input-area textarea:focus { border-color: #4361ee; }
.chat-input-area .send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #4361ee, #764ba2); color: #fff;
  font-size: 20px; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; line-height: 1;
}
.chat-input-area .send-btn:hover { transform: scale(1.06); }
.chat-input-area .send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* 加载动画 */
.typing-dots { display: flex; gap: 4px; padding: 8px 0; }
.typing-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: #bbb; animation: typingBounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes typingBounce {
  0%,80%,100% { transform: scale(.6); opacity: .4; }
  40% { transform: scale(1); opacity: 1; }
}

/* 响应式 */
@media (max-width: 480px) {
  .chat-panel { width: 92vw; right: 4vw; height: 64vh; bottom: 84px; }
  .chat-fab { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 24px; }
}
</style>

<!-- 浮动按钮 -->
<button class="chat-fab" id="chat-fab" title="智能客服" onclick="toggleChat()">
  💬
</button>

<!-- 聊天面板 -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <h3>🤖 智能客服 <span class="badge">AI</span></h3>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <!-- 欢迎消息 -->
    <div class="msg msg-assistant" id="welcome-msg">
      <div class="bubble">👋 你好！我是 x-form 智能客服助手，很高兴为你服务！<br><br>我可以帮你了解：<br>• 如何创建和管理表单<br>• 表单支持的字段类型<br>• 如何分享和填写表单<br>• 如何查看提交数据<br><br>请问有什么可以帮你的？</div>
      <div class="time">刚刚</div>
    </div>
  </div>
  <div class="quick-hints" id="quick-hints">
    <button class="quick-hint" onclick="sendQuick('如何创建一个表单？')">📝 如何创建表单</button>
    <button class="quick-hint" onclick="sendQuick('表单支持哪些字段类型？')">📋 字段类型</button>
    <button class="quick-hint" onclick="sendQuick('如何查看提交数据？')">📊 查看数据</button>
    <button class="quick-hint" onclick="sendQuick('如何分享表单给别人填写？')">🔗 分享表单</button>
  </div>
  <div class="chat-input-area">
    <textarea id="chat-textarea" placeholder="输入你的问题..." rows="1" onkeydown="onChatKeydown(event)"></textarea>
    <button class="send-btn" id="chat-send-btn" onclick="sendMessage()">▶</button>
  </div>
</div>

<script>
(function() {
  const API_CHAT = '/api/chat';
  const STORAGE_KEY = 'xform_chat_sid';

  let sessionId = localStorage.getItem(STORAGE_KEY) || '';
  let sending = false;

  window.toggleChat = function() {
    const panel = document.getElementById('chat-panel');
    const isOpen = panel.classList.contains('open');
    if (isOpen) {
      panel.classList.remove('open');
    } else {
      panel.classList.add('open');
      scrollToBottom();
      setTimeout(() => {
        const ta = document.getElementById('chat-textarea');
        if (ta) ta.focus();
      }, 300);
    }
  };

  window.sendQuick = function(msg) {
    document.getElementById('chat-textarea').value = msg;
    sendMessage();
  };

  window.onChatKeydown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  window.sendMessage = async function() {
    if (sending) return;
    const textarea = document.getElementById('chat-textarea');
    const message = textarea.value.trim();
    if (!message) return;

    sending = true;
    textarea.value = '';
    autoResize(textarea);

    // 添加用户消息
    appendMessage('user', message);
    // 隐藏快捷提示
    document.getElementById('quick-hints').style.display = 'none';
    document.getElementById('chat-send-btn').disabled = true;

    // 显示"正在输入"
    const typingEl = showTyping();

    try {
      const res = await fetch(API_CHAT + '/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message })
      });
      const json = await res.json();

      if (typingEl) typingEl.remove();

      if (json.code === '0000') {
        sessionId = json.data.sessionId;
        localStorage.setItem(STORAGE_KEY, sessionId);
        appendMessage('assistant', json.data.reply);
      } else {
        appendMessage('assistant', '抱歉，服务暂时不可用：' + (json.info || '未知错误'));
      }
    } catch (e) {
      if (typingEl) typingEl.remove();
      appendMessage('assistant', '网络连接失败，请检查网络后重试。');
    } finally {
      sending = false;
      document.getElementById('chat-send-btn').disabled = false;
      scrollToBottom();
    }
  };

  function appendMessage(role, content) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg msg-' + role;
    div.innerHTML = '<div class="bubble">' + escapeHtml(content) + '</div>'
      + '<div class="time">' + formatTime() + '</div>';
    container.appendChild(div);
    scrollToBottom();
  }

  function showTyping() {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg msg-assistant';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    container.appendChild(div);
    scrollToBottom();
    return div;
  }

  function scrollToBottom() {
    const el = document.getElementById('chat-messages');
    setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
  }

  function formatTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':'
         + d.getMinutes().toString().padStart(2,'0');
  }

  // 监听 textarea 自动调整高度
  document.addEventListener('DOMContentLoaded', function() {
    const ta = document.getElementById('chat-textarea');
    if (ta) {
      ta.addEventListener('input', function() { autoResize(ta); });
    }
  });
})();
</script>
