<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表单填写</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:24px;color:#1a1a2e;margin-bottom:8px}
.header p{color:#888;font-size:14px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;color:#333;margin-bottom:6px;font-weight:500}
.form-group label .required{color:#e74c3c;margin-left:2px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border .2s,box-shadow .2s;background:#fafafa}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1);background:#fff}
.form-group textarea{resize:vertical;min-height:100px}
.form-group .radio-group,.form-group .checkbox-group{display:flex;flex-wrap:wrap;gap:12px}
.form-group .radio-item,.form-group .checkbox-item{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}
.form-group .radio-item input,.form-group .checkbox-item input{width:auto}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(102,126,234,.4)}
.btn-primary:active{transform:translateY(0)}
.success-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:1000;justify-content:center;align-items:center}
.success-overlay.show{display:flex}
.success-card{background:#fff;border-radius:20px;padding:48px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:bounceIn .5s}
.success-card .icon{font-size:64px;margin-bottom:16px}
.success-card h2{color:#2ec4b6;margin-bottom:8px}
.success-card p{color:#888;margin-bottom:24px}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
.error{color:#e74c3c;font-size:12px;margin-top:4px;display:none}
.loading{text-align:center;padding:60px;color:#888}
.toast{position:fixed;top:24px;right:24px;padding:12px 24px;border-radius:8px;color:#fff;font-size:14px;z-index:2000}
.toast-error{background:#e74c3c}
</style>
</head>
<body>

<div class="container" id="form-container">
  <div class="loading" id="loading">⏳ 正在加载表单...</div>
  <div id="form-content" style="display:none">
    <div class="header">
      <h1 id="form-title"></h1>
      <p id="form-desc"></p>
    </div>
    <div id="form-fields"></div>
    <div class="form-group">
      <label>您的姓名</label>
      <input id="submitter-name" placeholder="请输入您的姓名">
    </div>
    <div class="form-group">
      <label>手机号码</label>
      <input id="submitter-phone" placeholder="请输入手机号码">
    </div>
    <button class="btn btn-primary" onclick="submitForm()">📤 提交表单</button>
  </div>
</div>

<div class="success-overlay" id="success-overlay">
  <div class="success-card">
    <div class="icon">🎉</div>
    <h2>提交成功！</h2>
    <p>感谢您的填写，表单已成功提交</p>
    <button class="btn btn-primary" style="width:auto;padding:10px 32px" onclick="location.reload()">再填一份</button>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const formKey = urlParams.get('key');
const API = '/api/form';

if (!formKey) {
  document.getElementById('loading').innerHTML = '<p style="color:#e74c3c">❌ 缺少表单标识（key参数），请通过正确的分享链接访问</p>';
} else {
  loadForm();
}

async function loadForm() {
  try {
    const res = await fetch(API + '/detail/' + formKey);
    const json = await res.json();
    if (json.code !== '0000') throw new Error(json.info);
    
    const form = json.data;
    document.getElementById('form-title').textContent = form.title;
    document.getElementById('form-desc').textContent = form.description || '';
    document.title = form.title + ' - 表单填写';

    const fieldsContainer = document.getElementById('form-fields');
    fieldsContainer.innerHTML = (form.fields || []).map(f => {
      let input = '';
      const req = f.required === 1 ? '<span class="required">*</span>' : '';
      const ph = f.placeholder || '请输入' + f.fieldLabel;

      switch(f.fieldType) {
        case 'textarea':
          input = `<textarea id="field-${f.fieldKey}" placeholder="${ph}" ${f.required?'required':''}></textarea>`;
          break;
        case 'number':
          input = `<input type="number" id="field-${f.fieldKey}" placeholder="${ph}" ${f.required?'required':''}>`;
          break;
        case 'select':
          const opts = (f.options || '').split(',').map(o => `<option value="${o.trim()}">${o.trim()}</option>`).join('');
          input = `<select id="field-${f.fieldKey}" ${f.required?'required':''}><option value="">请选择</option>${opts}</select>`;
          break;
        case 'radio':
          const radios = (f.options || '').split(',').map(o => 
            `<label class="radio-item"><input type="radio" name="field-${f.fieldKey}" value="${o.trim()}" ${f.required?'required':''}> ${o.trim()}</label>`
          ).join('');
          input = `<div class="radio-group">${radios}</div>`;
          break;
        case 'checkbox':
          const checks = (f.options || '').split(',').map(o => 
            `<label class="checkbox-item"><input type="checkbox" name="field-${f.fieldKey}" value="${o.trim()}"> ${o.trim()}</label>`
          ).join('');
          input = `<div class="checkbox-group">${checks}</div>`;
          break;
        case 'date':
          input = `<input type="date" id="field-${f.fieldKey}" ${f.required?'required':''}>`;
          break;
        case 'email':
          input = `<input type="email" id="field-${f.fieldKey}" placeholder="${ph}" ${f.required?'required':''}>`;
          break;
        default:
          input = `<input type="text" id="field-${f.fieldKey}" placeholder="${ph}" ${f.required?'required':''}>`;
      }
      return `<div class="form-group"><label>${f.fieldLabel} ${req}</label>${input}</div>`;
    }).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#e74c3c">❌ 加载失败: ' + e.message + '</p>';
  }
}

async function submitForm() {
  const name = document.getElementById('submitter-name').value.trim();
  if (!name) { toast('请输入您的姓名'); return; }

  const data = {};
  const form = document.getElementById('form-fields');
  const inputs = form.querySelectorAll('input,textarea,select');

  // 收集字段数据
  const fieldIds = {};
  form.querySelectorAll('[id^="field-"]').forEach(el => {
    const key = el.id.replace('field-', '');
    if (fieldIds[key]) return;
    fieldIds[key] = true;

    if (el.type === 'radio') {
      const checked = form.querySelector(`input[name="field-${key}"]:checked`);
      if (checked) data[key] = checked.value;
    } else if (el.type === 'checkbox') {
      const checked = form.querySelectorAll(`input[name="field-${key}"]:checked`);
      data[key] = Array.from(checked).map(c => c.value).join(',');
    } else if (el.id && el.id.startsWith('field-')) {
      data[key] = el.value;
    }
  });

  try {
    const res = await fetch(API + '/submit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({formKey, data, submitterName: name, submitterPhone: document.getElementById('submitter-phone').value.trim()})
    });
    const json = await res.json();
    if (json.code === '0000') {
      document.getElementById('success-overlay').classList.add('show');
    } else {
      toast('提交失败: ' + json.info);
    }
  } catch(e) {
    toast('请求失败: ' + e.message);
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-error';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}
</script>
</body>
</html>

<!-- ========== 智能客服浮窗 ========== -->
<style>
.chat-fab{position:fixed;bottom:28px;right:28px;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#4361ee,#764ba2);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(67,97,238,.4);z-index:9999;transition:all .3s;display:flex;align-items:center;justify-content:center;line-height:1}
.chat-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(67,97,238,.5)}
.chat-fab.hidden{display:none}
.chat-panel{position:fixed;bottom:96px;right:28px;width:380px;height:520px;background:#fff;border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.18);z-index:9998;display:none;flex-direction:column;overflow:hidden;transition:all .3s;animation:chatSlideUp .3s ease}
.chat-panel.open{display:flex}
@keyframes chatSlideUp{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.chat-header{background:linear-gradient(135deg,#4361ee,#764ba2);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-header h3{font-size:16px;font-weight:600;margin:0;display:flex;align-items:center;gap:8px}
.chat-header .badge{font-size:10px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px;font-weight:400}
.chat-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;opacity:.8}
.chat-close:hover{opacity:1}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#f7f8fc}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:4px}
.msg{max-width:82%;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-user{align-self:flex-end}
.msg-assistant{align-self:flex-start}
.msg-system{display:none}
.msg .bubble{padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg-user .bubble{background:linear-gradient(135deg,#4361ee,#5a4ff3);color:#fff;border-bottom-right-radius:4px}
.msg-assistant .bubble{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.msg .time{font-size:10px;color:#aaa;margin-top:4px;padding:0 4px}
.msg-user .time{text-align:right}
.quick-hints{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px;background:#f7f8fc;flex-shrink:0}
.quick-hint{padding:5px 12px;border-radius:14px;border:1px solid #e0e0e0;background:#fff;font-size:12px;color:#555;cursor:pointer;transition:all .2s;white-space:nowrap}
.quick-hint:hover{border-color:#4361ee;color:#4361ee;background:#f0f3ff}
.chat-input-area{padding:12px 16px;background:#fff;border-top:1px solid #f0f0f0;display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.chat-input-area textarea{flex:1;border:1.5px solid #e8e8e8;border-radius:20px;padding:9px 16px;font-size:13.5px;outline:none;resize:none;max-height:80px;font-family:inherit;line-height:1.5;transition:border .2s}
.chat-input-area textarea:focus{border-color:#4361ee}
.chat-input-area .send-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#4361ee,#764ba2);color:#fff;font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.chat-input-area .send-btn:hover{transform:scale(1.06)}
.chat-input-area .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.typing-dots{display:flex;gap:4px;padding:8px 0}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:#bbb;animation:typingBounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
@media(max-width:480px){.chat-panel{width:92vw;right:4vw;height:64vh;bottom:84px}.chat-fab{bottom:20px;right:20px;width:50px;height:50px;font-size:24px}}
</style>
<button class="chat-fab" id="chat-fab" title="智能客服" onclick="toggleChat()">💬</button>
<div class="chat-panel" id="chat-panel">
<div class="chat-header"><h3>🤖 智能客服 <span class="badge">AI</span></h3><button class="chat-close" onclick="toggleChat()">✕</button></div>
<div class="chat-messages" id="chat-messages">
<div class="msg msg-assistant"><div class="bubble">👋 你好！我是 x-form 智能客服助手！<br><br>我能帮你了解：<br>• 如何填写和提交表单<br>• 表单链接在哪里获取<br>• 提交后数据去哪里了<br>• 遇到填写问题怎么办<br><br>请问有什么可以帮你的？</div><div class="time">刚刚</div></div>
</div>
<div class="quick-hints" id="quick-hints">
<button class="quick-hint" onclick="sendQuick('如何填写表单？')">📝 如何填写</button>
<button class="quick-hint" onclick="sendQuick('我没有表单链接怎么办？')">🔗 获取链接</button>
<button class="quick-hint" onclick="sendQuick('提交后数据会保存在哪里？')">💾 数据保存</button>
</div>
<div class="chat-input-area">
<textarea id="chat-textarea" placeholder="输入你的问题..." rows="1" onkeydown="onChatKeydown(event)"></textarea>
<button class="send-btn" id="chat-send-btn" onclick="sendMessage()">▶</button>
</div>
</div>
<script>
(function(){var API='/api/chat',SK='xform_chat_sid',sid=localStorage.getItem(SK)||'',sending=false;window.toggleChat=function(){var p=document.getElementById('chat-panel');p.classList.contains('open')?p.classList.remove('open'):(p.classList.add('open'),scrollToBottom(),setTimeout(function(){var t=document.getElementById('chat-textarea');t&&t.focus()},300))};window.sendQuick=function(m){document.getElementById('chat-textarea').value=m;sendMessage()};window.onChatKeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}};window.sendMessage=async function(){if(sending)return;var ta=document.getElementById('chat-textarea'),msg=ta.value.trim();if(!msg)return;sending=true;ta.value='';autoResize(ta);appendMessage('user',msg);document.getElementById('quick-hints').style.display='none';document.getElementById('chat-send-btn').disabled=true;var typingEl=showTyping();try{var res=await fetch(API+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:sid,message:msg})});var json=await res.json();if(typingEl)typingEl.remove();if(json.code==='0000'){sid=json.data.sessionId;localStorage.setItem(SK,sid);appendMessage('assistant',json.data.reply)}else{appendMessage('assistant','抱歉，服务暂不可用：'+(json.info||'未知错误'))}}catch(e){if(typingEl)typingEl.remove();appendMessage('assistant','网络连接失败，请检查网络后重试。')}finally{sending=false;document.getElementById('chat-send-btn').disabled=false;scrollToBottom()}};function appendMessage(role,content){var c=document.getElementById('chat-messages'),d=document.createElement('div');d.className='msg msg-'+role;d.innerHTML='<div class="bubble">'+escapeHtml(content)+'</div><div class="time">'+formatTime()+'</div>';c.appendChild(d);scrollToBottom()}function showTyping(){var c=document.getElementById('chat-messages'),d=document.createElement('div');d.className='msg msg-assistant';d.id='typing-indicator';d.innerHTML='<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';c.appendChild(d);scrollToBottom();return d}function scrollToBottom(){var e=document.getElementById('chat-messages');setTimeout(function(){e.scrollTop=e.scrollHeight},50)}function autoResize(e){e.style.height='auto';e.style.height=Math.min(e.scrollHeight,80)+'px'}function escapeHtml(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>')}function formatTime(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}document.addEventListener('DOMContentLoaded',function(){var ta=document.getElementById('chat-textarea');ta&&ta.addEventListener('input',function(){autoResize(ta)})})})();
</script>
